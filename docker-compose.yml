services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-budget_manager}
      MYSQL_USER: ${MYSQL_USER:-budget}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-budget_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-budget_manager}
      DB_USER: ${MYSQL_USER:-budget}
      DB_PASS: ${MYSQL_PASSWORD:-budget_secret}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"

  # El front de React se compila dentro de la imagen en el BUILD.
  # Si cambias código en frontend/ y sigues viendo la versión vieja en el puerto WEB_PORT:
  #   docker compose build web && docker compose up -d web
  # o de una vez: docker compose up --build -d
  # Para iterar sin rebuild de imagen: npm run build en frontend/ y usa docker-compose.dev.yml
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  db_data:
